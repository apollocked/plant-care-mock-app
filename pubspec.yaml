name: mock_plant_care_app
description: "A new Flutter project."
publish_to: "none"

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  font_awesome_flutter:
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons:

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/plant_icon.png"
  # Teal background for Android
  adaptive_icon_background: "#008080"
  adaptive_icon_foreground: "assets/images/plant_image.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/ # Ensure this is here so Flutter sees your plant_icon.png
