name: mock_plant_care_app
description: "A modern plant care assistant."
publish_to: "none"

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.8
  awesome_notifications: ^0.11.0
  provider: ^6.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/plant_icon.png"
  adaptive_icon_background: "#008080"
  adaptive_icon_foreground: "assets/images/plant_image.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/